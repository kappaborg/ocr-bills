name: receipt_scanner_app
description: OCR Receipt Scanner — scan, track and analyse your expenses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Camera & image
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  image_cropper: ^7.1.0

  # Charts
  fl_chart: ^0.68.0

  # UI helpers
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

  # File / share
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
